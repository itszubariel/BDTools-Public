<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | BDTools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            indigo: {
              600: '#4F46E5',
              700: '#4338CA',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-[#1e1e2f] flex items-center justify-center h-screen">
  <div class="text-center p-8 bg-white dark:bg-[#26293a] rounded-2xl shadow-lg max-w-lg mx-auto animate-fade-in">
    <!-- Logo -->
    <img src="https://bdtools.netlify.app/images/bdfd_logo.png" alt="BDTools Logo" class="mx-auto h-16 w-16 rounded-full mb-4" />
    
    <!-- Title -->
    <h1 class="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400">404</h1>
    <h2 class="text-xl font-semibold text-gray-700 dark:text-gray-200 mt-2">Page Not Found</h2>
    
    <!-- Message -->
    <p class="text-gray-600 dark:text-gray-400 mt-4">
      Oops! The page you are looking for does not exist or has been moved.
    </p>

    <!-- Buttons -->
    <div class="mt-6 flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/" class="bg-indigo-600 text-white px-6 py-3 rounded-full shadow-md hover:bg-indigo-700 transition">
        Back to Home
      </a>
      <a href="/contact" class="bg-white text-indigo-600 dark:bg-[#2e3246] dark:text-indigo-400 border border-indigo-600 dark:border-indigo-400 px-6 py-3 rounded-full shadow hover:bg-gray-50 dark:hover:bg-[#3b3f54] transition">
        Contact Us
      </a>
    </div>
  </div>

  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.8s ease-out forwards;
    }
  </style>
</body>
</html>
