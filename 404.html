<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>404</title>
    <link rel="icon" href="https://bdtools.xyz/images/bdfd_logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;700;800;900&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    /> 
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Geist", "sans-serif"],
              mono: ["Geist Mono", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Geist", sans-serif;
      }

      .tog-track {
        width: 40px;
        height: 22px;
        border-radius: 999px;
        background: #e8e9f2;
        position: relative;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }

      .tog-track.on {
        background: #5865f2;
      }

      .tog-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 3px;
        left: 3px;
        transition: transform 0.2s;
      }

      .tog-track.on .tog-thumb {
        transform: translateX(18px);
      }

      html.light body {
        background: #f4f5fa !important;
        color: #0f1117 !important;
      }

      html.light nav {
        background: rgba(244, 245, 250, 0.92) !important;
        border-color: #e2e4ef !important;
      }

      html.light .dark-surface {
        background: #fff !important;
        border-color: #e2e4ef !important;
      }

      html.light .dark-text {
        color: #0f1117 !important;
      }

      html.light .dark-text-2 {
        color: #4b5563 !important;
      }

      html.light footer {
        background: #f4f5fa !important;
        border-color: #e2e4ef !important;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-12px);
        }
      }

      .float {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fu {
        animation: fadeUp 0.35s ease both;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .scroll-fade {
        opacity: 0;
        transform: translateY(30px);
      }

      .scroll-fade.visible {
        animation: fadeInUp 0.6s ease forwards;
      }
    </style>
  </head>

  <body class="bg-[#080a10] text-gray-100 min-h-screen flex flex-col">
    <nav
      class="sticky top-0 z-50 border-b"
      style="border-color: #1e2130; background: #080a10/90"
    >
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between gap-4"
      >
        <a href="/" class="flex items-center gap-2.5 group flex-shrink-0">
          <img
            src="/images/bdfd_logo.png"
            alt="BDTools"
            class="w-7 h-7 rounded-lg"
            onerror="this.style.display = 'none'"
          />
          <span class="font-bold tracking-tight t1">BDTools</span>
        </a>
        <div class="flex items-center gap-3">
          <span
            id="themeLabel"
            class="text-xs text-gray-500 hidden sm:block select-none"
            >Dark Mode</span
          >
          <div id="themeToggle" class="tog-track on" onclick="toggleTheme()">
            <div class="tog-thumb"></div>
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-20">
      <div class="text-center fu scroll-fade">
        <div
          class="float text-8xl font-black text-[#5865F3]/60 select-none mb-4"
          style="font-family: &quot;Geist Mono&quot;, monospace"
        >
          404
        </div>
        <div
          class="w-16 h-16 rounded-2xl bg-[#5865F2]/10 border border-[#5865F2]/20 flex items-center justify-center mx-auto mb-6"
        >
          <svg
            class="w-8 h-8 text-[#5865F2]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <h1
          class="text-3xl font-black text-white mb-3 tracking-tight dark-text"
        >
          Page Not Found
        </h1>
        <p class="text-gray-500 dark-text-2 mb-8 max-w-sm mx-auto">
          Looks like this page doesn't exist — it may have been moved, deleted,
          or you might have the wrong URL.
        </p>
        <div class="flex flex-wrap gap-3 justify-center">
          <a
            href="/"
            class="px-5 py-2.5 bg-[#5865F2] hover:bg-[#4752c4] text-white text-sm font-semibold rounded-xl transition-colors"
          >
            Go Home
          </a>
          <a
            href="javascript:history.back()"
            class="px-5 py-2.5 bg-[#1e2130] hover:bg-[#252840] text-gray-300 text-sm font-semibold rounded-xl border border-[#2e3350] transition-colors dark-surface"
          >
            Go Back
          </a>
        </div>
      </div>
    </main>

    <footer class="border-t border-[#1e2130] bg-[#080a10]">
      <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-3"
      >
        <span class="text-sm text-gray-600"
          >© 2026 BDTools. All rights reserved.</span
        >
        <div class="flex items-center gap-4 text-xs text-gray-600">
          <a href="/tos" class="hover:text-gray-400 transition-colors"
            >Terms of Service</a
          >
          <a href="/privacy" class="hover:text-gray-400 transition-colors"
            >Privacy Policy</a
          >
          <a href="/contact" class="hover:text-gray-400 transition-colors"
            >Contact</a
          >
        </div>
      </div>
    </footer>

    <script>
      function toggleTheme() {
        const html = document.documentElement;
        const toggle = document.getElementById("themeToggle");
        const label = document.getElementById("themeLabel");
        const isLight = html.classList.contains("light");

        if (isLight) {
          html.classList.replace("light", "dark");
          toggle.classList.add("on");
          label.textContent = "Dark Mode";
        } else {
          html.classList.replace("dark", "light");
          toggle.classList.remove("on");
          label.textContent = "Light Mode";
        }
        localStorage.setItem("theme", isLight ? "dark" : "light");
      }

      /* ── Apply saved preference on load ── */
      (function () {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.classList.replace("dark", "light");
          document.getElementById("themeToggle").classList.remove("on");
          document.getElementById("themeLabel").textContent = "Light Mode";
        }
      })();

      // Scroll fade-in observer
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              observer.unobserve(entry.target);
            }
          });
        },
        {
          threshold: 0.1,
          rootMargin: "0px 0px -50px 0px",
        },
      );

      window.addEventListener("load", () => {
        const fadeElements = document.querySelectorAll(".scroll-fade");
        fadeElements.forEach((el) => observer.observe(el));
      });
    </script>
  </body>
</html>
